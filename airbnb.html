        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', 'Inter', sans-serif;
            background: #F5F5F5;
            color: #1A1A1A;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* Back button */
        .back-button {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
        }

        .back-button a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            color: #1A1A1A;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-button a:hover {
            background: #B8622B;
            color: white;
            transform: translateX(-3px);
        }

        /* Property Hero */
        .property-hero {
            padding: 80px 0 20px;
            background: white;
        }

        .property-title {
            font-size: 2.5rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .property-location {
            color: #B8622B;
            font-weight: 500;
            margin-bottom: 30px;
        }

        /* Main Image */
        .image-section {
            background: white;
            padding: 0 0 40px;
        }

        .main-image img {
            width: 100%;
            height: auto;
            border-radius: 20px;
            display: block;
        }

        /* Project Details Section */
        .project-details {
            padding: 60px 0;
            background: white;
        }

        .project-details h2 {
            font-size: 2rem;
            font-weight: 600;
            margin: 40px 0 20px;
        }

        .project-details h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 30px 0 15px;
            color: #B8622B;
        }

        .project-details p {
            color: #444;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .project-details strong {
            font-weight: 600;
            color: #1A1A1A;
        }

        .project-details ul {
            margin: 20px 0;
            padding-left: 40px;
        }

        .project-details li {
            font-size: 1.1rem;
            color: #444;
            margin-bottom: 10px;
        }

        .project-image {
            margin: 30px 0;
            text-align: center;
        }

        .project-image img {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .dashboard-link {
            margin: 40px 0 20px;
            text-align: center;
        }

        .dashboard-link a {
            display: inline-block;
            background: #B8622B;
            color: white;
            padding: 14px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .dashboard-link a:hover {
            background: #a04f1f;
            transform: translateY(-2px);
        }

        /* Footer */
        .site-footer {
            background: #1A1A1A;
            color: #aaa;
            text-align: center;
            padding: 30px 0;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .back-button {
                top: 15px;
                left: 15px;
            }
        }

        .main-image img {
            width: 100%;
            max-width: 800px;    /* optional limit */
            height: 400px;       /* fixed height */
            object-fit: cover;   /* crops to fill the box without stretching */
            border-radius: 20px;
            display: block;
            margin: 0 auto;      /* centers if max-width is set */
        }
    </style>
