    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', 'Inter', sans-serif;
            background: #F5F5F5;
            color: #1A1A1A;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* Back button */
        .back-button {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
        }

        .back-button a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            color: #1A1A1A;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-button a:hover {
            background: #B8622B;
            color: white;
            transform: translateX(-3px);
        }

        /* Property Hero */
        .property-hero {
            padding: 80px 0 20px;
            background: white;
        }

        .property-title {
            font-size: 2.5rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .property-location {
            color: #B8622B;
            font-weight: 500;
            margin-bottom: 30px;
        }

        /* Main Image */
        .image-section {
            background: white;
            padding: 0 0 40px;
        }

        .main-image img {
            width: 100%;
            max-width: 800px;
            height: 400px;
            object-fit: cover;
            border-radius: 20px;
            display: block;
            margin: 0 auto;
        }

        /* Project Details Section */
        .project-details {
            padding: 60px 0;
            background: white;
        }

        .project-details h2 {
            font-size: 2rem;
            font-weight: 600;
            margin: 40px 0 20px;
        }

        .project-details h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 30px 0 15px;
            color: #B8622B;
        }

        .project-details p {
            color: #444;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .project-details strong {
            font-weight: 600;
            color: #1A1A1A;
        }

        .project-details ul {
            margin: 20px 0;
            padding-left: 40px;
        }

        .project-details li {
            font-size: 1.1rem;
            color: #444;
            margin-bottom: 10px;
        }

        .project-image {
            margin: 30px 0;
            text-align: center;
        }

        .project-image img {
            width: 600px;
            height: 850px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 100%;
        }

        .image-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .image-row .project-image {
            margin: 0;
            flex: 1 1 300px;
        }

        .code-section {
            margin: 30px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .github-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .github-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .code-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(184, 98, 43, 0.1);
            color: #B8622B;
            padding: 12px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(184, 98, 43, 0.3);
        }

        .code-link:hover {
            background: #B8622B;
            color: white;
            gap: 15px;
            border-color: #B8622B;
        }

        .dashboard-link {
            margin: 40px 0 20px;
            text-align: center;
        }

        .dashboard-link a {
            display: inline-block;
            background: #B8622B;
            color: white;
            padding: 14px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .dashboard-link a:hover {
            background: #a04f1f;
            transform: translateY(-2px);
        }

        /* Footer */
        .site-footer {
            background: #1A1A1A;
            color: #aaa;
            text-align: center;
            padding: 30px 0;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .back-button {
                top: 15px;
                left: 15px;
            }
            .image-row {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
